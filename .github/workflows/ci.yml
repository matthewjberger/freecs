name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install example linker dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features dynamic -- -D warnings
      - run: cargo clippy --all-targets --features snapshot -- -D warnings

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install example linker dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev
      - run: cargo test
      - run: cargo test --features dynamic
      - run: cargo test --features snapshot
      - run: cargo check --lib --no-default-features

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib --target wasm32-unknown-unknown
      - run: cargo check --lib --target wasm32-unknown-unknown --no-default-features
      - run: cargo check --lib --target wasm32-unknown-unknown --features dynamic
      - run: cargo check --lib --target wasm32-unknown-unknown --features snapshot

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib
      - run: cargo check --lib --features snapshot
      - run: cargo check --lib --features dynamic
